<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>At Risk Today</title>

  <meta name="app-name" content="At Risk Today">
  <meta name="app-description" content="What you risk missing today and the one action to take now. Confirmed deadlines rank; Gmail and agent signals wait for your OK. Live GitHub CI source, demo fallback.">
  <meta name="app-tags" content="attention, deadlines, live-source, pwa">

  <meta name="theme-color" content="#FAF9F5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    :root {
      --bg: #FAF9F5;
      --card: #FFFFFF;
      --ink: #1F1E1D;
      --muted: #6B6A65;
      --faint: #9A9892;
      --clay: #D97757;
      --clay-deep: #C15F3C;
      --on-clay: #FFFFFF;
      --line: #ECEAE3;
      --red: #B4432B;
      --green: #3F7D4E;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      padding:
        calc(env(safe-area-inset-top) + 18px)
        calc(env(safe-area-inset-right) + 18px)
        calc(env(safe-area-inset-bottom) + 24px)
        calc(env(safe-area-inset-left) + 18px);
    }

    .wrap { max-width: 460px; margin: 0 auto; }

    /* header */
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .top .id { display: flex; align-items: center; gap: 10px; }
    .mark {
      width: 34px; height: 34px; border-radius: 10px; background: var(--clay);
      display: flex; align-items: center; justify-content: center; flex: none;
      box-shadow: 0 4px 12px rgba(193, 95, 60, 0.26);
    }
    .mark svg { width: 20px; height: 20px; display: block; }
    .top h2 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
    .top .date { font-size: 12px; color: var(--muted); margin: 1px 0 0; }
    .badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--clay-deep); background: rgba(217, 119, 87, 0.12);
      padding: 4px 8px; border-radius: 999px;
    }

    /* hero */
    .hero { margin-bottom: 18px; }
    .eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--red); display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex: none;
      animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .tag {
      font-size: 11px; font-weight: 600; color: var(--muted); background: var(--bg);
      border: 1px solid var(--line); padding: 3px 9px; border-radius: 999px; margin-left: auto;
      text-transform: none; letter-spacing: 0; white-space: nowrap;
    }
    .hero h1 {
      font-family: ui-serif, "New York", Georgia, "Times New Roman", serif;
      font-weight: 600; font-size: 30px; line-height: 1.15; letter-spacing: -0.01em;
      margin: 0 0 12px;
    }
    .when { font-size: 15px; line-height: 1.45; color: var(--ink); margin: 0 0 4px; }
    .when b { color: var(--red); }
    .why-line { font-size: 13px; color: var(--muted); margin: 0; }

    /* action */
    .action-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 18px;
      padding: 18px; margin: 18px 0; box-shadow: 0 8px 24px rgba(31,30,29,0.05);
    }
    .action-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--faint); margin: 0 0 8px;
    }
    .action-text { font-size: 17px; font-weight: 600; line-height: 1.3; margin: 0 0 16px; }
    button {
      appearance: none; border: 0; font: inherit; cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease, opacity 0.2s ease;
    }
    button:active { transform: scale(0.98); }
    .btn-do {
      width: 100%; background: var(--clay); color: var(--on-clay);
      font-size: 17px; font-weight: 600; padding: 16px; border-radius: 14px;
    }
    .btn-do.done { background: var(--green); }
    .row { display: flex; gap: 10px; margin-top: 10px; }
    .btn-ghost {
      flex: 1; background: transparent; color: var(--muted); border: 1px solid var(--line);
      font-size: 14px; font-weight: 600; padding: 11px; border-radius: 12px;
    }

    /* provenance */
    .prov { margin: 0 2px 22px; }
    .prov summary {
      list-style: none; cursor: pointer; font-size: 12px; color: var(--faint);
      display: flex; align-items: center; gap: 6px;
    }
    .prov summary::-webkit-details-marker { display: none; }
    .prov[open] summary { color: var(--muted); }
    .prov .body { font-size: 13px; color: var(--muted); line-height: 1.55; margin-top: 10px; padding-left: 2px; }
    .prov .body b { color: var(--ink); }
    .chip {
      display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
      background: rgba(63,125,78,0.12); color: var(--green); margin-right: 4px;
    }
    .chip.warn { background: rgba(180,67,43,0.1); color: var(--red); }

    /* sections */
    .sec-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--faint); margin: 0 2px 10px; display: flex; align-items: center; gap: 8px;
    }
    .sec-title .n {
      background: var(--line); color: var(--muted); font-size: 11px; padding: 1px 7px; border-radius: 999px;
    }
    .stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
    .item {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .item .meta { min-width: 0; flex: 1; }
    .item .t { font-size: 14px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .s { font-size: 12px; color: var(--muted); margin: 2px 0 0; }
    .item .due { font-size: 12px; font-weight: 700; flex: none; }
    .due.soon { color: var(--red); }
    .due.ok { color: var(--muted); }
    .item.cand { border-style: dashed; }
    .item .src-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--faint); border: 1px solid var(--line); padding: 2px 6px; border-radius: 6px; flex: none;
    }
    .btn-confirm {
      flex: none; background: var(--bg); color: var(--clay-deep); border: 1px solid rgba(217,119,87,0.4);
      font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 10px;
    }
    .cand-note { font-size: 12px; color: var(--faint); line-height: 1.5; margin: -10px 2px 22px; }

    .foot { text-align: center; font-size: 11px; color: var(--faint); line-height: 1.6; margin-top: 8px; }

    .empty { text-align: center; color: var(--muted); padding: 30px 10px; }
    .empty .big {
      font-family: ui-serif, "New York", Georgia, serif; font-size: 24px; color: var(--ink); margin-bottom: 8px;
    }

    /* origin badges */
    .origin {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 6px; flex: none;
    }
    .origin.live { background: rgba(63,125,78,0.16); color: var(--green); }
    .origin.demo { background: var(--bg); color: var(--faint); border: 1px solid var(--line); }
    .origin.confirmed { background: rgba(217,119,87,0.14); color: var(--clay-deep); }
    .eyebrow .origin { margin-left: 2px; }

    /* settings / sources panel */
    .settings { margin: 4px 2px 18px; border-top: 1px solid var(--line); padding-top: 12px; }
    .settings > summary {
      list-style: none; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .settings > summary::-webkit-details-marker { display: none; }
    .settings .gear { width: 14px; height: 14px; flex: none; opacity: 0.7; }
    .src-row {
      display: flex; align-items: center; gap: 10px; padding: 12px 0; border-top: 1px solid var(--line);
    }
    .src-row:first-of-type { border-top: 0; margin-top: 6px; }
    .src-row .sn { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
    .src-row .sn small { display: block; font-weight: 400; font-size: 11px; color: var(--faint); margin-top: 2px; }
    .st {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px; flex: none;
    }
    .st.live { background: rgba(63,125,78,0.16); color: var(--green); }
    .st.blocked { background: rgba(180,67,43,0.12); color: var(--red); }
    .st.demo { background: var(--bg); color: var(--faint); border: 1px solid var(--line); }
    .st.available { background: rgba(217,119,87,0.12); color: var(--clay-deep); }
    .tg {
      font-size: 12px; font-weight: 700; border: 1px solid var(--line); background: var(--bg);
      color: var(--muted); padding: 6px 11px; border-radius: 9px; flex: none;
    }
    .tg.on { border-color: rgba(63,125,78,0.45); color: var(--green); }
    .src-extra { padding: 0 0 4px; }
    .blocker { font-size: 12px; color: var(--muted); line-height: 1.5; margin: 2px 0 0; }
    .repo-input {
      width: 100%; font: inherit; font-size: 13px; padding: 9px 11px; border: 1px solid var(--line);
      border-radius: 9px; background: var(--bg); color: var(--ink); margin-top: 8px;
    }
    .repo-input:focus { outline: none; border-color: var(--clay); }

    /* monitoring deck */
    .mon-pill { font-size: 12px; font-weight: 700; flex: none; }
    .mon-pill.green { color: var(--green); }
    .mon-pill.red { color: var(--red); }
    .mon-pill.amber { color: #B8791F; }
    .btn-connect {
      width: 100%; margin: 2px 0 22px; background: transparent; color: var(--clay-deep);
      border: 1px dashed rgba(217,119,87,0.5); font-size: 14px; font-weight: 700;
      padding: 12px; border-radius: 12px;
    }

    /* connection wizard modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(20,19,18,0.5); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
      display: flex; align-items: flex-end; justify-content: center; z-index: 50; animation: fade 0.18s ease;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 460px; background: var(--card); color: var(--ink);
      border-radius: 22px 22px 0 0;
      padding: 20px calc(env(safe-area-inset-right) + 18px) calc(env(safe-area-inset-bottom) + 22px) calc(env(safe-area-inset-left) + 18px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.25); animation: rise 0.22s ease;
    }
    @keyframes rise { from { transform: translateY(24px); } to { transform: translateY(0); } }
    .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .modal-top h3 { font-family: ui-serif, "New York", Georgia, serif; font-size: 21px; font-weight: 600; margin: 0; }
    .modal-x { background: transparent; color: var(--muted); font-size: 24px; line-height: 1; padding: 4px 8px; border: 0; }
    .modal-sub { font-size: 13px; color: var(--muted); line-height: 1.5; margin: 0 0 14px; }
    .wz-opt {
      width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 3px; position: relative;
    }
    .wz-opt b { font-size: 15px; }
    .wz-opt small { font-size: 12px; color: var(--muted); max-width: 76%; }
    .wz-ok, .wz-lock, .wz-pend {
      position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
    }
    .wz-ok { background: rgba(63,125,78,0.16); color: var(--green); }
    .wz-lock { background: rgba(180,67,43,0.12); color: var(--red); }
    .wz-pend { background: rgba(217,119,87,0.14); color: var(--clay-deep); }
    .wz-need { background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
    .wz-need > p { font-size: 13px; color: var(--muted); line-height: 1.55; margin: 10px 0 0; }
    .wz-safe { color: var(--green) !important; font-weight: 600; }
    .modal-foot { font-size: 12px; color: var(--faint); margin: 12px 0 0; text-align: center; }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1F1E1D; --card: #2A2927; --ink: #F5F4EF; --muted: #B0AEA6; --faint: #807E77;
        --line: #3A3936; --red: #E8896F; --green: #6FB888;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="id">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M256 106 C270 220 292 242 406 256 C292 270 270 292 256 406 C242 292 220 270 106 256 C220 242 242 220 256 106 Z" fill="#FAF9F5"/>
          </svg>
        </div>
        <div>
          <h2>At Risk Today</h2>
          <p class="date" id="date"></p>
        </div>
      </div>
      <span class="badge">Demo data</span>
    </header>

    <main id="content"></main>

    <p class="foot">One answer, ranked by what you can least afford to miss.<br>
      Confirmed deadlines rank &middot; email &amp; agent signals wait for your OK.</p>
  </div>

  <script>
    // ---- demo data: Simon's real domains, dates relative to "now" ----
    // trust tiers: "deadline" / "calendar" / "github" rank directly;
    // "gmail" / "agent" are SENSORS - they propose, never rank until confirmed.
    var DAY = 86400000;
    var now = new Date();
    function inDays(n, h) { var d = new Date(now.getTime() + n * DAY); if (h != null) d.setHours(h, 0, 0, 0); return d.toISOString(); }

    var ITEMS = [
      { id: "ss",   domain: "Admin / taxes",    src: "deadline", consequence: "high",
        title: "Declare quarterly income to Seg Social",
        due: inDays(2, 23),
        why: "Misses the trimestral window; penalty and it touches your subsidio calc.",
        prov: "Confirmed deadline from the SSD e-Clic notice (primary source). Not inferred from an email subject line.",
        action: "Open SSD e-Clic and submit the GD declaration" },

      { id: "bike", domain: "Personal",         src: "deadline", consequence: "high",
        title: "File the Engwe e-bike warranty claim",
        due: inDays(4, 18),
        why: "Coverage window closes; after this you eat the repair cost.",
        prov: "Date taken from the purchase receipt (primary source).",
        action: "Submit the warranty form to Engwe support" },

      { id: "irs",  domain: "Admin / taxes",    src: "deadline", consequence: "high",
        title: "Lock the IRS 2025 filing with Cristina",
        due: inDays(31, 23),
        why: "Hard deadline 30 Jun; your own target was today. Backup accountant on standby.",
        prov: "Statutory deadline (AT). Self-set target lives in your markdown, flagged stale.",
        action: "Reply to Cristina to confirm filing, else trigger backup" },

      { id: "dent", domain: "Calendar",         src: "calendar", consequence: "med",
        title: "Dentist appointment",
        due: inDays(1, 9),
        why: "You booked it; tomorrow morning. Low stakes but easy to no-show.",
        prov: "From your Calendar. You placed it, so it is trusted as scheduled.",
        action: "Confirm you are going, or reschedule now" },

      { id: "radar", domain: "GitHub / agents", src: "github", consequence: "med",
        title: "pipeline-radar production deploy is failing",
        due: null,
        why: "Build red on main for 2 days; the lead-scoring cron is not running.",
        prov: "Factual machine state from the GitHub Actions run. State, not opinion.",
        action: "Open the failing build log and redeploy" }
    ];

    // SENSORS - detected candidates. Cannot be the hero until you confirm.
    var CANDIDATES = [
      { id: "oj",  domain: "Freelance / revenue", src: "gmail",
        title: "Oliver James lead (700/day) has gone quiet",
        sub: "Bianca, last reply 25 days ago",
        promotePrompt: "Confirm this is a live lead worth a nudge?",
        action: "Send Bianca a short follow-up",
        due: inDays(0, 20), consequence: "high", domainFull: "Freelance / revenue",
        why: "A high-value lead is cooling; a nudge today could revive it.",
        prov: "Surfaced from a Gmail thread. Email meaning is NOT trusted until you confirm - that is why it is not ranked." },

      { id: "audit", domain: "GitHub / agents", src: "agent",
        title: "Nightly agent flagged: pnpm audit is red on main",
        sub: "3 advisories, agent-reported",
        promotePrompt: "Confirm the agent's finding is real?",
        action: "Review the audit and patch",
        due: inDays(3, 23), consequence: "med", domainFull: "GitHub / agents",
        why: "Dependency advisories on main; needs a look before next ship.",
        prov: "Reported by a Claude agent. Agent output can hallucinate, so it waits for your confirmation." }
    ];

    // ---- sources that need approval / a credential ----
    // The wizard explains the SAFE path for each. It never collects a secret on this
    // public origin - credentialed sources are routed to a backend (simon-ops), not localStorage.
    var APPROVAL_SOURCES = [
      { key: "ghsec", label: "GitHub security alerts", sub: "high-severity code scanning / Dependabot",
        need: "Code-scanning and Dependabot alerts are not public - reading high-severity findings needs a token with security-events scope. Storing that token on this public page would let any XSS on the lab origin steal it. Safe path: a serverless proxy in simon-ops holds the token server-side and this app calls /api/security.",
        safeHome: "simon-ops backend proxy" },
      { key: "privrepos", label: "Private repos", sub: "crons that live in private repos",
        need: "Private-repo Actions need an authenticated token - same exposure risk on a public origin. Safe path: the same simon-ops backend proxy, or run this app from a private deployment.",
        safeHome: "simon-ops backend proxy" },
      { key: "calendar", label: "Calendar", sub: "obligations and deadlines",
        need: "Needs Google OAuth + a serverless token exchange (a backend). A build-time snapshot is also unsafe: this deploy is public and would expose private events.",
        safeHome: "OAuth backend" },
      { key: "gmail", label: "Gmail", sub: "follow-ups",
        need: "Same OAuth + privacy blocker as Calendar, and heavier (thread parsing). Stays a demo signal you confirm by hand until a secure backend exists.",
        safeHome: "OAuth backend" }
    ];

    // ---- state (localStorage, never window.storage; never a credential) ----
    var KEY = "atrisk.v1";
    var DEFAULT_REPOS = ["simonsangla/lab", "simonsangla/portfolio-v2", "simonsangla/proofforge"];
    var state = load();
    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }
    function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
    function done(id) { return state[id] === "done" || state[id] === "snooze"; }
    function monEnabled() { return state["mon.enabled"] !== false; }
    function monRepos() {
      var r = state["mon.repos"];
      if (Array.isArray(r) && r.length) return r;
      if (state["gh.repo"]) return [state["gh.repo"]];   // migrate older single-repo state
      return DEFAULT_REPOS.slice();
    }

    // ---- Claude monitoring deck: GitHub Actions across your repos (public, no auth) ----
    // Each monitored repo's latest workflow run = the health of an automated agent/cron.
    var monState = { status: "idle", repos: {}, lastRefresh: 0 };
    function monHasLive() {
      return monEnabled() && monState.status === "live" &&
        Object.keys(monState.repos).some(function (k) { return monState.repos[k] && !monState.repos[k].error; });
    }
    function monAttentionItems() {
      // only FAILING or STALE runs become rank-eligible attention items
      var out = [];
      Object.keys(monState.repos).forEach(function (full) {
        var r = monState.repos[full];
        if (!r || r.error || r.empty) return;
        var name = full.split("/").pop();
        if (r.fail) {
          out.push({ id: "mon:" + full, origin: "live", domain: "Agent / cron", src: "github",
            consequence: "high", due: null,
            title: "CI is failing on " + name,
            why: 'Latest run "' + r.runName + '" ' + r.conclusion + " " + rel(r.updatedAt) + ". An automated agent/cron is broken.",
            prov: "Live from the GitHub Actions API (public repo, no auth). Objective machine state - a failing run, not inferred.",
            action: "Open the failing run on " + name + " and fix it" });
        } else if (r.stale) {
          out.push({ id: "mon:" + full, origin: "live", domain: "Agent / cron", src: "github",
            consequence: "low", due: null,
            title: name + " has not run in " + r.staleDays + " days",
            why: 'Last run "' + r.runName + '" ' + rel(r.updatedAt) + ". A scheduled cron may have stopped firing.",
            prov: "Live from the GitHub Actions API. Stale = no recent run; could be a paused or broken schedule.",
            action: "Check the workflow schedule on " + name });
        }
      });
      return out;
    }
    function fetchMonitoring() {
      if (!monEnabled()) { monState = { status: "off", repos: {}, lastRefresh: 0 }; render(); return; }
      var repos = monRepos();
      monState = { status: "loading", repos: {}, lastRefresh: 0 }; render();
      Promise.all(repos.map(function (full) {
        return fetch("https://api.github.com/repos/" + full + "/actions/runs?per_page=1",
              { headers: { "Accept": "application/vnd.github+json" } })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status +
              (res.status === 403 ? " (rate limit)" : res.status === 404 ? " (not found / private)" : ""));
            return res.json();
          })
          .then(function (data) {
            var run = (data.workflow_runs || [])[0];
            if (!run) return { full: full, empty: true };
            var complete = run.status === "completed";
            var fail = complete && run.conclusion && ["success", "neutral", "skipped"].indexOf(run.conclusion) < 0;
            var ageDays = Math.floor((Date.now() - new Date(run.updated_at).getTime()) / DAY);
            return { full: full, runName: run.name || "workflow", status: run.status,
              conclusion: run.conclusion || run.status, updatedAt: run.updated_at,
              fail: fail, running: !complete, ok: complete && !fail, stale: ageDays >= 14, staleDays: ageDays };
          })
          .catch(function (e) { return { full: full, error: String(e.message || e) }; });
      })).then(function (results) {
        var map = {};
        results.forEach(function (r) { map[r.full] = r; });
        monState = { status: "live", repos: map, lastRefresh: Date.now() };
        render();
      });
    }

    // ---- ranking: rank-eligible items only, by risk of missing ----
    function daysLeft(iso) { if (!iso) return 9999; return Math.ceil((new Date(iso).getTime() - Date.now()) / DAY); }
    function score(it) {
      var d = daysLeft(it.due);
      var base = d <= 0 ? 1000 - d : Math.max(0, 200 - d * 6);   // sooner = higher; overdue tops out
      var w = it.consequence === "high" ? 60 : it.consequence === "med" ? 25 : 0;
      var snoozed = state[it.id] === "snooze" ? -500 : 0;          // snoozed sinks but can resurface
      return base + w + snoozed;
    }
    function ranked() {
      // demo items; live monitoring (real GitHub Actions) supersedes the demo GitHub item
      var base = ITEMS.map(function (it) { return Object.assign({}, it, { origin: "demo" }); });
      if (monHasLive()) base = base.filter(function (it) { return it.id !== "radar"; }).concat(monAttentionItems());
      var promoted = CANDIDATES.filter(function (c) { return state["confirm:" + c.id] === 1; })
        .map(function (c) { return { id: c.id, domain: c.domainFull, src: c.src, consequence: c.consequence,
          title: c.title, due: c.due, why: c.why, prov: c.prov, action: c.action, origin: "confirmed" }; });
      return base.concat(promoted)
        .filter(function (it) { return state[it.id] !== "done"; })
        .sort(function (a, b) { return score(b) - score(a); });
    }
    function pendingCandidates() {
      return CANDIDATES.filter(function (c) { return state["confirm:" + c.id] !== 1 && state[c.id] !== "done"; });
    }

    // ---- helpers ----
    function dueText(iso) {
      if (!iso) return { txt: "ongoing", cls: "ok" };
      var d = daysLeft(iso);
      if (d < 0) return { txt: "OVERDUE", cls: "soon" };
      if (d === 0) return { txt: "today", cls: "soon" };
      if (d === 1) return { txt: "tomorrow", cls: "soon" };
      return { txt: "in " + d + " days", cls: d <= 3 ? "soon" : "ok" };
    }
    function srcPill(s) {
      return ({ deadline: "Deadline", calendar: "Calendar", github: "GitHub", gmail: "Gmail", agent: "Agent" })[s] || s;
    }
    function esc(t) { var e = document.createElement("div"); e.textContent = t; return e.innerHTML; }
    function rel(iso) {
      if (!iso) return "";
      var min = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
      if (min < 1) return "just now";
      if (min < 60) return min + " min ago";
      var hr = Math.round(min / 60);
      if (hr < 24) return hr + (hr === 1 ? " hour ago" : " hours ago");
      var d = Math.round(hr / 24);
      return d + (d === 1 ? " day ago" : " days ago");
    }
    function originLabel(o) { return o === "live" ? "Live" : o === "confirmed" ? "Confirmed" : "Demo"; }

    // ---- wizard state (not persisted; never holds a credential) ----
    var wizard = { open: false, view: "menu", error: "" };
    var GEAR = '<svg class="gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';

    // ---- Settings / source-status surface ----
    function settingsHtml() {
      var on = monEnabled();
      var mst = !on ? "available" : monState.status === "live" ? "live" : "available";
      var mlabel = !on ? "Off" : monState.status === "live" ? "Live" : "Connecting";
      var h = '<details class="settings" id="settings"' + (state["ui.settings"] ? " open" : "") + '>';
      h += '<summary>' + GEAR + 'Sources and status</summary>';
      h += '<div class="src-row"><div class="sn">GitHub Actions monitoring<small>' +
        monRepos().length + ' repos' + (monState.status === "live" && monState.lastRefresh ? ' &middot; ' + esc(rel(new Date(monState.lastRefresh).toISOString())) : "") +
        '</small></div><span class="st ' + mst + '">' + mlabel + '</span>' +
        '<button class="tg ' + (on ? "on" : "") + '" data-mon-toggle>' + (on ? "On" : "Off") + '</button></div>';
      APPROVAL_SOURCES.forEach(function (s) {
        var pend = state["pending:" + s.key];
        h += '<div class="src-row"><div class="sn">' + esc(s.label) + '<small>' + esc(s.sub) + '</small></div>' +
          '<span class="st ' + (pend ? "available" : "blocked") + '">' + (pend ? "Pending" : "Needs approval") + '</span>' +
          '<button class="tg" data-wz="approval:' + s.key + '">Connect</button></div>';
      });
      h += '<div class="src-row"><div class="sn">Demo data<small>Taxes, personal and freelance seed items</small></div>' +
        '<span class="st demo">Demo</span></div>';
      h += '</details>';
      return h;
    }

    // ---- Claude monitoring deck (real GitHub Actions across your repos) ----
    function deckHtml() {
      var repos = monRepos();
      var h = '<p class="sec-title">Agent &amp; cron monitoring <span class="n">' + repos.length + '</span></p>';
      h += '<div class="stack">';
      repos.forEach(function (full) {
        var r = monEnabled() ? monState.repos[full] : null;
        var name = full.split("/").pop();
        var pill, sub;
        if (!monEnabled()) { pill = '<span class="due ok">off</span>'; sub = "monitoring disabled"; }
        else if (monState.status === "loading" || !r) { pill = '<span class="due ok">checking</span>'; sub = "fetching latest run"; }
        else if (r.error) { pill = '<span class="mon-pill red">error</span>'; sub = esc(r.error); }
        else if (r.empty) { pill = '<span class="due ok">no runs</span>'; sub = "no workflow runs yet"; }
        else if (r.fail) { pill = '<span class="mon-pill red">failing</span>'; sub = esc(r.runName) + " &middot; " + esc(rel(r.updatedAt)); }
        else if (r.running) { pill = '<span class="mon-pill amber">running</span>'; sub = esc(r.runName) + " &middot; " + esc(rel(r.updatedAt)); }
        else if (r.stale) { pill = '<span class="mon-pill amber">stale</span>'; sub = "last run " + esc(rel(r.updatedAt)); }
        else { pill = '<span class="mon-pill green">green</span>'; sub = esc(r.runName) + " &middot; " + esc(rel(r.updatedAt)); }
        h += '<div class="item"><span class="src-pill">Repo</span><div class="meta"><p class="t">' + esc(name) + '</p><p class="s">' + sub + '</p></div>' + pill + '</div>';
      });
      h += '</div>';
      h += '<button class="btn-connect" data-wz="open">+ Connect a source</button>';
      return h;
    }

    // ---- connection wizard (no secret ever stored on this public origin) ----
    function wizardHtml() {
      if (!wizard.open) return "";
      var h = '<div class="modal-bg" id="wz-bg"><div class="modal">';
      h += '<div class="modal-top"><h3>Connect a source</h3><button class="modal-x" data-wz="close">' + String.fromCharCode(215) + '</button></div>';
      if (wizard.view === "menu") {
        h += '<p class="modal-sub">Public sources connect instantly. Anything needing a credential is routed to a safe backend - no token is ever stored on this public page.</p>';
        h += '<button class="wz-opt" data-wz="addrepo"><b>Monitor a public GitHub repo</b><small>A cron or agent that runs as GitHub Actions. No auth needed.</small><span class="wz-ok">Safe</span></button>';
        APPROVAL_SOURCES.forEach(function (s) {
          var pend = state["pending:" + s.key];
          h += '<button class="wz-opt" data-wz="approval:' + s.key + '"><b>' + esc(s.label) + '</b><small>' + esc(s.sub) + '</small>' +
            (pend ? '<span class="wz-pend">Pending</span>' : '<span class="wz-lock">Needs approval</span>') + '</button>';
        });
      } else if (wizard.view === "addrepo") {
        h += '<p class="modal-sub">Enter a public repo (owner/repo). Its latest workflow run becomes a monitored agent/cron.</p>';
        h += '<input class="repo-input" id="wz-repo" placeholder="owner/repo" autocapitalize="off" autocorrect="off" spellcheck="false">';
        if (wizard.error) h += '<p class="blocker">' + esc(wizard.error) + '</p>';
        h += '<div class="row"><button class="btn-ghost" data-wz="menu">Back</button><button class="btn-do" data-wz="addrepo-go">Add and check</button></div>';
      } else if (wizard.view.indexOf("approval:") === 0) {
        var key = wizard.view.slice(9);
        var s = APPROVAL_SOURCES.filter(function (x) { return x.key === key; })[0] || {};
        var pend = state["pending:" + key];
        h += '<div class="wz-need"><span class="st blocked">Needs approval</span><p>' + esc(s.need) + '</p>' +
          '<p class="wz-safe">' + String.fromCharCode(10003) + ' No secret is collected or stored on this public origin.</p></div>';
        h += '<div class="row"><button class="btn-ghost" data-wz="menu">Back</button>' +
          '<button class="btn-do" data-wz="pending:' + key + '">' + (pend ? "Pending - tap to clear" : "Mark as pending") + '</button></div>';
        h += '<p class="modal-foot">Safe home: ' + esc(s.safeHome) + '.</p>';
      }
      h += '</div></div>';
      return h;
    }

    function handleWz(v) {
      if (v === "close") { wizard.open = false; render(); return; }
      if (v === "open" || v === "menu") { wizard.open = true; wizard.view = "menu"; wizard.error = ""; render(); return; }
      if (v === "addrepo") { wizard.open = true; wizard.view = "addrepo"; wizard.error = ""; render(); return; }
      if (v === "addrepo-go") {
        var inp = document.getElementById("wz-repo");
        var val = inp ? inp.value.trim() : "";
        if (!/^[\w.\-]+\/[\w.\-]+$/.test(val)) { wizard.error = "Use owner/repo format, e.g. simonsangla/lab."; render(); return; }
        var repos = monRepos();
        if (repos.indexOf(val) < 0) repos = repos.concat([val]);
        state["mon.repos"] = repos; state["mon.enabled"] = true; save();
        wizard.open = false; fetchMonitoring(); return;
      }
      if (v.indexOf("approval:") === 0) { wizard.open = true; wizard.view = v; render(); return; }
      if (v.indexOf("pending:") === 0) { var k = v.slice(8); state["pending:" + k] = state["pending:" + k] ? 0 : 1; save(); render(); return; }
    }

    // ---- render ----
    var content = document.getElementById("content");
    document.getElementById("date").textContent =
      now.toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });

    function render() {
      var list = ranked();
      var hero = list[0];
      var behind = list.length - 1;
      var cands = pendingCandidates();
      var html = "";

      if (!hero) {
        html += '<div class="empty"><div class="big">Nothing at risk.</div>' +
          '<p>Everything ranked is handled. Confirm a signal below if something needs to surface.</p></div>';
      } else {
        var d = dueText(hero.due);
        html += '<section class="hero">';
        html += '<div class="eyebrow"><span class="dot"></span>You risk missing<span class="origin ' + hero.origin + '">' + originLabel(hero.origin) + '</span><span class="tag">' + esc(hero.domain) + '</span></div>';
        html += '<h1>' + esc(hero.title) + '</h1>';
        html += '<p class="when"><b>' + d.txt + '</b>' + (hero.due ? ' &middot; ' : '') + esc(hero.why) + '</p>';
        html += '</section>';

        html += '<div class="action-card">';
        html += '<p class="action-label">The one action</p>';
        html += '<p class="action-text">' + esc(hero.action) + '</p>';
        html += '<button class="btn-do" id="do">Mark this done</button>';
        html += '<div class="row">';
        html += '<button class="btn-ghost" id="snooze">Not today</button>';
        html += '</div></div>';

        html += '<details class="prov"><summary>Why this is #1 ' + String.fromCharCode(8595) + '</summary>';
        html += '<div class="body"><span class="chip">' + srcPill(hero.src) + '</span>';
        html += '<b>' + d.txt + (hero.due ? ' to act' : '') + '.</b> ' + esc(hero.prov) + '</div></details>';
      }

      if (behind > 0) {
        html += '<p class="sec-title">Ranked behind it <span class="n">' + behind + '</span></p>';
        html += '<div class="stack">';
        for (var i = 1; i < list.length; i++) {
          var it = list[i], dd = dueText(it.due);
          html += '<div class="item"><span class="src-pill">' + srcPill(it.src) + '</span>';
          html += '<div class="meta"><p class="t">' + esc(it.title) + '</p><p class="s">' + esc(it.domain) + ' &middot; ' + originLabel(it.origin) + '</p></div>';
          html += '<span class="due ' + dd.cls + '">' + dd.txt + '</span></div>';
        }
        html += '</div>';
      }

      if (cands.length) {
        html += '<p class="sec-title">Needs your confirmation <span class="n">' + cands.length + '</span></p>';
        html += '<div class="stack">';
        cands.forEach(function (c) {
          html += '<div class="item cand"><span class="src-pill">' + srcPill(c.src) + '</span>';
          html += '<div class="meta"><p class="t">' + esc(c.title) + '</p><p class="s">' + esc(c.sub) + '</p></div>';
          html += '<button class="btn-confirm" data-confirm="' + c.id + '">Confirm</button></div>';
        });
        html += '</div>';
        html += '<p class="cand-note">These came from Gmail and an agent. They will not rank, or become your #1, until you confirm them - signals are not treated as truth.</p>';
      }

      html += deckHtml();
      html += settingsHtml();
      html += wizardHtml();
      content.innerHTML = html;

      var badge = document.querySelector(".badge");
      if (badge) badge.textContent = monHasLive() ? "Live + demo" : "Demo data";
      wire();
    }

    function flashThenRerender(btn, label) {
      btn.classList.add("done");
      btn.textContent = String.fromCharCode(10003) + " " + label;
      btn.disabled = true;
      setTimeout(render, 480);
    }

    function wire() {
      var heroItem = ranked()[0];
      var doBtn = document.getElementById("do");
      if (doBtn) doBtn.onclick = function () { state[heroItem.id] = "done"; save(); flashThenRerender(doBtn, "Done"); };
      var sn = document.getElementById("snooze");
      if (sn) sn.onclick = function () { state[heroItem.id] = "snooze"; save(); render(); };
      var cs = document.querySelectorAll("[data-confirm]");
      for (var i = 0; i < cs.length; i++) {
        cs[i].onclick = function () { state["confirm:" + this.getAttribute("data-confirm")] = 1; save(); render(); };
      }
      var setEl = document.getElementById("settings");
      if (setEl) setEl.addEventListener("toggle", function () { state["ui.settings"] = setEl.open ? 1 : 0; save(); });
      var mtg = document.querySelector("[data-mon-toggle]");
      if (mtg) mtg.onclick = function () { state["mon.enabled"] = !monEnabled(); save(); fetchMonitoring(); };
      // wizard: backdrop closes; inner actions stop propagation so they never close on click-through
      var bg = document.getElementById("wz-bg");
      if (bg) bg.onclick = function (e) { if (e.target === bg) { wizard.open = false; render(); } };
      var wzEls = document.querySelectorAll("[data-wz]");
      for (var j = 0; j < wzEls.length; j++) {
        wzEls[j].onclick = function (e) { e.stopPropagation(); handleWz(this.getAttribute("data-wz")); };
      }
    }

    render();           // instant first paint with demo data (keeps open fast)
    fetchMonitoring();  // then fill the monitoring deck with live GitHub Actions data
  </script>
</body>
</html>
