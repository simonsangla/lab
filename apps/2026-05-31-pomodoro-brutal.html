<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pomodoro Brutal &mdash; lab.</title>
<meta name="app-name" content="Pomodoro Brutal">
<meta name="app-description" content="Pomodoro timer that roasts you with escalating dark humor when you overstay your break. Claude writes the roasts. They get worse.">
<meta name="app-tags" content="fun,productivity,ai,daily">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#009A44">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pomodoro Brutal">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #1e1e1e;
    --accent: #29d8c7; --red: #ef4444; --yellow: #facc15; --green: #22c55e;
    --text: #e8e8e8; --muted: #5a5a5a;
    --font-display: 'Syne', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-display);
    min-height: 100dvh;
    padding: max(60px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    position: relative;
    overscroll-behavior-y: contain;
  }
  a, button { -webkit-tap-highlight-color: transparent; }
  .back { font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-decoration: none; position: absolute; top: 20px; left: 20px; }
  .back:hover, .back:active { color: var(--accent); }
  .wrap { max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
  header h1 { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: var(--accent); margin: 0; text-align: center; }
  header p { color: var(--muted); font-size: 14px; margin: 6px 0 0; text-align: center; }
  .timer {
    text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 16px;
  }
  .clock {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(64px, 14vw, 96px);
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .clock.focus { color: var(--accent); }
  .clock.break { color: var(--green); }
  .clock.overdue { color: var(--red); }
  .phase {
    font-family: var(--font-mono); font-size: 14px;
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .phase.focus { color: var(--accent); }
  .phase.break { color: var(--green); }
  .phase.overdue { color: var(--red); }
  .settings { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .control { display: flex; flex-direction: column; gap: 6px; }
  .control label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stepper { display: flex; align-items: stretch; gap: 0; }
  .stepper button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--accent); font-family: var(--font-display); font-size: 18px;
    min-width: 36px; min-height: 36px; padding: 0;
    cursor: pointer;
  }
  .stepper button:first-child { border-radius: 6px 0 0 6px; border-right: 0; }
  .stepper button:last-child { border-radius: 0 6px 6px 0; border-left: 0; }
  .stepper input {
    width: 70px; text-align: center;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono); font-size: 16px;
    border-radius: 0; padding: 6px 4px; outline: none;
  }
  .buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--accent); font-family: var(--font-display); font-size: 15px;
    border-radius: 6px; padding: 10px 18px; cursor: pointer;
    min-height: 44px;
    transition: background 180ms ease, border-color 180ms ease;
  }
  .btn:hover, .btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .key-setup {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .key-setup details summary { cursor: pointer; color: var(--muted); }
  .key-setup details summary:hover { color: var(--accent); }
  .key-setup input {
    width: 100%; margin-top: 8px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono); font-size: 16px;
    border-radius: 4px; padding: 8px 10px; outline: none;
  }
  .key-setup .warn { color: var(--yellow); margin-top: 8px; line-height: 1.5; }
  .key-setup .ok { color: var(--green); margin-top: 8px; }
  .roasts { display: flex; flex-direction: column; gap: 12px; }
  .roast {
    background: var(--surface); border: 1px solid var(--red);
    border-radius: 8px; padding: 16px;
  }
  .roast .label {
    font-family: var(--font-mono); font-size: 11px; color: var(--red);
    margin-bottom: 6px; letter-spacing: 1px;
  }
  .roast .body {
    font-family: var(--font-display); font-weight: 400; font-size: 15px;
    color: var(--text); line-height: 1.5;
  }
  .roast.final {
    border-color: var(--red);
  }
  .roast.final .body { color: var(--red); font-style: italic; }
  .roast .err { color: var(--muted); font-style: italic; font-family: var(--font-mono); font-size: 13px; }
  @media (prefers-reduced-motion: reduce) {
    .btn, .stepper button { transition: none; }
  }
</style>
<link rel="stylesheet" href="/assets/lab-theme.css">
</head>
<body>
  <a class="back" href="../">&larr; lab.</a>
  <div class="wrap">
    <header>
      <h1>Pomodoro Brutal</h1>
      <p>Focus. Break. Get roasted.</p>
    </header>
    <div class="timer">
      <div id="clock" class="clock focus">25:00</div>
      <div id="phase" class="phase focus">FOCUS</div>
    </div>
    <div id="settings" class="settings">
      <div class="control">
        <label>Focus (min)</label>
        <div class="stepper">
          <button type="button" id="focusMinus">&minus;</button>
          <input id="focusMin" type="number" min="1" max="90" value="25" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button type="button" id="focusPlus">+</button>
        </div>
      </div>
      <div class="control">
        <label>Break (min)</label>
        <div class="stepper">
          <button type="button" id="breakMinus">&minus;</button>
          <input id="breakMin" type="number" min="1" max="30" value="5" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button type="button" id="breakPlus">+</button>
        </div>
      </div>
    </div>
    <div id="buttons" class="buttons">
      <button class="btn" id="primary" type="button">Start Focus</button>
      <button class="btn" id="secondary" type="button" style="display:none">Reset</button>
    </div>
    <div class="key-setup">
      <details>
        <summary>AI roasts &mdash; bring your own Anthropic API key (optional)</summary>
        <input id="apiKey" type="password" placeholder="sk-ant-... (stored locally only)" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="warn" id="keyWarn">No key set &mdash; falling back to canned roasts. Key (if set) is stored only in your browser's localStorage and sent only to api.anthropic.com.</div>
        <button class="btn" id="saveKey" type="button" style="margin-top:10px">Save key</button>
        <button class="btn" id="clearKey" type="button" style="margin-top:10px">Clear key</button>
      </details>
    </div>
    <div id="roasts" class="roasts"></div>
  </div>
<script>
(function () {
  var clockEl = document.getElementById('clock');
  var phaseEl = document.getElementById('phase');
  var settingsEl = document.getElementById('settings');
  var focusMinEl = document.getElementById('focusMin');
  var breakMinEl = document.getElementById('breakMin');
  var focusPlus = document.getElementById('focusPlus');
  var focusMinus = document.getElementById('focusMinus');
  var breakPlus = document.getElementById('breakPlus');
  var breakMinus = document.getElementById('breakMinus');
  var buttonsEl = document.getElementById('buttons');
  var primary = document.getElementById('primary');
  var secondary = document.getElementById('secondary');
  var apiKeyEl = document.getElementById('apiKey');
  var saveKey = document.getElementById('saveKey');
  var clearKey = document.getElementById('clearKey');
  var keyWarn = document.getElementById('keyWarn');
  var roastsEl = document.getElementById('roasts');

  var KEY_STORE = 'lab.pomodoro-brutal.anthropic-key';
  var state = 'idle';
  var phase = 'focus';
  var endsAt = null;
  var pausedRemainingMs = 0;
  var overdueStart = null;
  var roastCount = 0;
  var lastRoastAt = 0;
  var tickHandle = null;
  var inflightRoast = false;

  var CANNED = [
    "Two minutes ago this was a break. Now it is a hobby.",
    "The work has not done itself. Surprising no one.",
    "Your future self called. They are unimpressed.",
    "Every minute here is a minute your competitors are billing.",
    "At this point even your snacks are bored. Get back to it."
  ];

  function loadKey() {
    try { return localStorage.getItem(KEY_STORE) || ''; } catch (e) { return ''; }
  }
  function setKey(k) {
    try {
      if (k) { localStorage.setItem(KEY_STORE, k); }
      else { localStorage.removeItem(KEY_STORE); }
    } catch (e) {}
  }
  function refreshKeyUi() {
    var k = loadKey();
    if (k) {
      apiKeyEl.value = k;
      keyWarn.className = 'ok';
      keyWarn.textContent = 'Key saved locally. Live roasts active until break overdue.';
    } else {
      apiKeyEl.value = '';
      keyWarn.className = 'warn';
      keyWarn.textContent = 'No key set — falling back to canned roasts. Key (if set) is stored only in your browser’s localStorage and sent only to api.anthropic.com.';
    }
  }
  saveKey.addEventListener('click', function () { setKey(apiKeyEl.value.trim()); refreshKeyUi(); });
  clearKey.addEventListener('click', function () { setKey(''); refreshKeyUi(); });
  refreshKeyUi();

  function focusMin() { var n = parseInt(focusMinEl.value, 10); return (isNaN(n) || n < 1) ? 1 : Math.min(90, n); }
  function breakMin() { var n = parseInt(breakMinEl.value, 10); return (isNaN(n) || n < 1) ? 1 : Math.min(30, n); }

  function pad(n) { n = Math.floor(n); return n < 10 ? '0' + n : '' + n; }
  function formatMS(ms) {
    var abs = Math.abs(ms);
    var totalSec = Math.floor(abs / 1000);
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return (ms < 0 ? '+' : '') + pad(m) + ':' + pad(s);
  }

  function beep(freq, dur) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    } catch (e) {}
  }
  function focusEndChime() {
    beep(880, 0.3);
    setTimeout(function () { beep(880, 0.3); }, 400);
    setTimeout(function () { beep(880, 0.3); }, 800);
  }
  function breakEndChime() { beep(440, 0.5); }

  function setButtons(primaryText, secondaryText) {
    primary.textContent = primaryText;
    if (secondaryText) {
      secondary.textContent = secondaryText;
      secondary.style.display = 'inline-flex';
    } else {
      secondary.style.display = 'none';
    }
  }

  function render() {
    var now = Date.now();
    if (state === 'running') {
      var remaining = endsAt - now;
      clockEl.textContent = formatMS(Math.max(0, remaining));
      if (remaining <= 0) {
        if (phase === 'focus') {
          phase = 'break';
          endsAt = now + breakMin() * 60 * 1000;
          clockEl.className = 'clock break';
          phaseEl.className = 'phase break';
          phaseEl.textContent = 'BREAK';
          setButtons('Pause', 'Skip / Start Focus');
          focusEndChime();
        } else {
          state = 'overdue';
          overdueStart = now;
          phase = 'overdue';
          clockEl.className = 'clock overdue';
          phaseEl.className = 'phase overdue';
          phaseEl.textContent = 'OVERDUE';
          setButtons('Start Next Focus', 'Reset');
          breakEndChime();
        }
      }
    } else if (state === 'overdue') {
      var over = now - overdueStart;
      clockEl.textContent = formatMS(-over);
      if (over >= 30000 && roastCount === 0) {
        triggerRoast(over);
      } else if (over - lastRoastAt >= 60000 && roastCount > 0 && roastCount < 5) {
        triggerRoast(over);
      }
    } else if (state === 'paused') {
      clockEl.textContent = formatMS(Math.max(0, pausedRemainingMs));
    } else {
      var ms = (phase === 'break' ? breakMin() : focusMin()) * 60 * 1000;
      clockEl.textContent = formatMS(ms);
    }
  }

  function startFocus() {
    phase = 'focus';
    state = 'running';
    endsAt = Date.now() + focusMin() * 60 * 1000;
    overdueStart = null;
    roastCount = 0;
    lastRoastAt = 0;
    inflightRoast = false;
    roastsEl.innerHTML = '';
    clockEl.className = 'clock focus';
    phaseEl.className = 'phase focus';
    phaseEl.textContent = 'FOCUS';
    settingsEl.style.display = 'none';
    setButtons('Pause', 'Skip Break');
    startTick();
  }
  function pauseTimer() {
    if (state !== 'running') return;
    state = 'paused';
    pausedRemainingMs = endsAt - Date.now();
    setButtons('Resume', 'Reset');
    stopTick();
    render();
  }
  function resumeTimer() {
    if (state !== 'paused') return;
    state = 'running';
    endsAt = Date.now() + pausedRemainingMs;
    setButtons('Pause', phase === 'focus' ? 'Skip Break' : 'Skip / Start Focus');
    startTick();
  }
  function skipBreak() {
    startFocus();
  }
  function resetAll() {
    state = 'idle';
    phase = 'focus';
    endsAt = null;
    pausedRemainingMs = 0;
    overdueStart = null;
    roastCount = 0;
    lastRoastAt = 0;
    inflightRoast = false;
    clockEl.className = 'clock focus';
    phaseEl.className = 'phase focus';
    phaseEl.textContent = 'FOCUS';
    settingsEl.style.display = 'flex';
    roastsEl.innerHTML = '';
    setButtons('Start Focus', null);
    stopTick();
    render();
  }

  primary.addEventListener('click', function () {
    if (state === 'idle') startFocus();
    else if (state === 'running') {
      if (phase === 'focus') pauseTimer();
      else pauseTimer();
    } else if (state === 'paused') resumeTimer();
    else if (state === 'overdue') startFocus();
  });
  secondary.addEventListener('click', function () {
    var label = secondary.textContent;
    if (label === 'Reset') resetAll();
    else if (label.indexOf('Skip') === 0) {
      if (phase === 'focus' && state === 'running') {
        state = 'running'; phase = 'break';
        endsAt = Date.now() + breakMin() * 60 * 1000;
        clockEl.className = 'clock break';
        phaseEl.className = 'phase break'; phaseEl.textContent = 'BREAK';
        setButtons('Pause', 'Skip / Start Focus');
      } else {
        startFocus();
      }
    }
  });

  function bindStepper(input, plus, minus, min, max) {
    plus.addEventListener('click', function () {
      var n = parseInt(input.value, 10) || min;
      if (n < max) input.value = n + 1;
      render();
    });
    minus.addEventListener('click', function () {
      var n = parseInt(input.value, 10) || min;
      if (n > min) input.value = n - 1;
      render();
    });
    input.addEventListener('input', render);
  }
  bindStepper(focusMinEl, focusPlus, focusMinus, 1, 90);
  bindStepper(breakMinEl, breakPlus, breakMinus, 1, 30);

  function startTick() {
    if (tickHandle) return;
    tickHandle = setInterval(render, 250);
    render();
  }
  function stopTick() {
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
  }

  function appendRoast() {
    roastCount += 1;
    var node = document.createElement('div');
    node.className = 'roast';
    var label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'ROAST #' + roastCount;
    var body = document.createElement('div');
    body.className = 'body';
    node.appendChild(label);
    node.appendChild(body);
    roastsEl.appendChild(node);
    return body;
  }
  function appendFinal() {
    var node = document.createElement('div');
    node.className = 'roast final';
    node.innerHTML = '<div class="label">FINAL</div><div class="body">I’m done with you. Start working.</div>';
    roastsEl.appendChild(node);
  }
  function appendError(body) {
    body.innerHTML = '<span class="err">Roast failed to load. You’re lucky.</span>';
  }

  function pickCanned() {
    var idx = Math.min(CANNED.length - 1, roastCount);
    return CANNED[idx];
  }

  function streamCanned(body, text) {
    var words = text.split(/(\s+)/);
    var i = 0;
    var iv = setInterval(function () {
      if (i >= words.length) { clearInterval(iv); return; }
      body.textContent += words[i++];
    }, 70);
  }

  function triggerRoast(overdueMs) {
    if (inflightRoast || roastCount >= 5) return;
    inflightRoast = true;
    lastRoastAt = overdueMs;
    var body = appendRoast();
    var key = loadKey();
    var overdueMin = Math.floor(overdueMs / 60000);

    function finish() {
      inflightRoast = false;
      if (roastCount >= 5) appendFinal();
    }

    if (!key) {
      streamCanned(body, pickCanned());
      finish();
      return;
    }

    var sys = 'You are a brutally sarcastic but funny productivity coach. Write exactly ONE short roast (max 2 sentences) for someone who is still on their break ' + overdueMin + ' minutes after it ended. Roast number ' + roastCount + ': be progressively meaner as the number increases. Never repeat yourself. No emoji. Just words.';
    var user = 'They are ' + overdueMin + ' minutes overdue. Roast number ' + roastCount + ' of maximum 5. Escalate the darkness.';

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 120,
        stream: true,
        system: sys,
        messages: [{ role: 'user', content: user }]
      })
    }).then(function (res) {
      if (!res.ok || !res.body) throw new Error('http ' + res.status);
      var reader = res.body.getReader();
      var dec = new TextDecoder();
      var buf = '';
      function pump() {
        return reader.read().then(function (chunk) {
          if (chunk.done) { finish(); return; }
          buf += dec.decode(chunk.value, { stream: true });
          var lines = buf.split('\n');
          buf = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.indexOf('data:') !== 0) continue;
            var payload = line.slice(5).trim();
            if (!payload || payload === '[DONE]') continue;
            try {
              var ev = JSON.parse(payload);
              if (ev.type === 'content_block_delta' && ev.delta && typeof ev.delta.text === 'string') {
                body.textContent += ev.delta.text;
              }
            } catch (e) {}
          }
          return pump();
        });
      }
      return pump();
    }).catch(function () {
      if (body.textContent.length === 0) appendError(body);
      finish();
    });
  }

  render();
})();
</script>
</body>
</html>
