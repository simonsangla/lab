<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SQL Pulse &mdash; lab.</title>
<meta name="app-name" content="SQL Pulse">
<meta name="app-description" content="Instant complexity scorer for Snowflake SQL queries. Counts joins, CTEs, window functions and ranks your query from SIMPLE to BEAST.">
<meta name="app-tags" content="snowflake,sql,analytics,tools">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#009A44">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SQL Pulse">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #1e1e1e;
    --accent: #29d8c7;
    --accent2: #6366f1;
    --text: #e8e8e8;
    --muted: #5a5a5a;
    --font-display: 'Syne', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100dvh;
    padding: max(16px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(48px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    overscroll-behavior-y: contain;
  }
  a, button { -webkit-tap-highlight-color: transparent; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .back {
    display: inline-flex; align-items: center; min-height: 36px;
    font-family: var(--font-mono); font-size: 13px;
    color: var(--muted); text-decoration: none;
    margin-bottom: 16px;
  }
  .back:hover, .back:active { color: var(--accent); }
  h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 26px; color: var(--accent); margin: 0;
    line-height: 1.15;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin: 6px 0 20px; }
  textarea {
    width: 100%; min-height: 160px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono);
    font-size: 16px; line-height: 1.5;
    border-radius: 8px; padding: 14px; resize: vertical;
    outline: none;
    transition: border-color 180ms ease;
  }
  textarea:focus { border-color: var(--accent); }
  .results { margin-top: 24px; padding: 20px 18px; }
  .tier-badge {
    display: block; text-align: center;
    font-family: var(--font-display); font-weight: 700; font-size: 18px;
    padding: 12px 24px; border-radius: 99px;
    margin: 0 auto 20px; max-width: 220px;
    color: #fff; letter-spacing: 1px;
  }
  .dim { margin-bottom: 12px; }
  .dim-row {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--muted); margin-bottom: 4px;
  }
  .dim-row .count { color: var(--accent); font-weight: 700; }
  .bar { height: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill {
    height: 100%; width: 0; border-radius: 3px;
    transition: width 300ms ease, background-color 300ms ease;
  }
  .diagnosis {
    margin-top: 16px; font-family: var(--font-mono);
    font-size: 13px; color: var(--muted);
    font-style: italic; text-align: center;
    line-height: 1.5;
  }
  .copy-wrap { text-align: center; margin-top: 20px; }
  /* file:// fallback: matches .lab-btn-quiet's single-class specificity so the
     shared component (loaded later in /assets/lab-theme.css) wins on live. */
  .copy-fallback {
    min-height: 44px;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); padding: 8px 20px;
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    border-radius: 99px; cursor: pointer;
  }
  .empty-state {
    text-align: center; color: var(--muted);
    margin-top: 32px; font-size: 14px;
  }
  .empty-state .hint {
    display: inline-block; margin-top: 10px;
    font-family: var(--font-mono); font-size: 12px; opacity: 0.75;
  }
  @media (prefers-reduced-motion: reduce) {
    .bar-fill, textarea, .copy-btn { transition: none; }
  }
  @media (min-width: 640px) {
    body { padding-left: 20px; padding-right: 20px; padding-top: max(24px, env(safe-area-inset-top)); }
    h1 { font-size: 28px; }
    .subtitle { font-size: 14px; margin-bottom: 24px; }
    .back { font-size: 12px; margin-bottom: 24px; }
    textarea { min-height: 180px; font-size: 14px; }
    .tier-badge { font-size: 20px; max-width: 240px; }
  }
</style>
<link rel="stylesheet" href="/assets/lab-theme.css">
<script src="/assets/lab-nav.js" defer></script>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">&larr; lab.</a>
    <h1>SQL Pulse</h1>
    <p class="subtitle">Snowflake query complexity scorer</p>
    <textarea id="sql"
      placeholder="-- paste your Snowflake SQL here"
      inputmode="text"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"></textarea>
    <div id="out">
      <p class="empty-state">Paste a query above to analyse it.<br><span class="hint">Try: SELECT * FROM orders JOIN customers USING (id)</span></p>
    </div>
  </div>
<script>
(function () {
  var ta = document.getElementById('sql');
  var out = document.getElementById('out');
  var timer = null;

  function score(sql) {
    var up = sql.toUpperCase();
    var joins = (up.match(/\bJOIN\b/g) || []).length;
    var subqueries = Math.max(0, (up.match(/\bSELECT\b/g) || []).length - 1);
    var windowFns = (up.match(/\bOVER\s*\(/g) || []).length;
    var ctes = /\bWITH\b/.test(up) ? (up.match(/\bAS\s*\(/g) || []).length : 0;
    var groupBy = (up.match(/\bGROUP\s+BY\b/g) || []).length;
    var having = (up.match(/\bHAVING\b/g) || []).length;
    return { joins: joins, subqueries: subqueries, windowFns: windowFns, ctes: ctes, groupBy: groupBy, having: having };
  }

  function tierFor(total) {
    // Brand tokens drive the live light theme; the hex is the file:// fallback.
    if (total === 0) return { name: 'SIMPLE', color: 'var(--green, #2BC06A)' };
    if (total <= 4) return { name: 'MODERATE', color: 'var(--yellow, #facc15)' };
    if (total <= 9) return { name: 'COMPLEX', color: 'var(--orange, #f97316)' };
    return { name: 'BEAST', color: 'var(--red, #ef4444)' };
  }

  function barColor(n) {
    if (n === 0) return 'var(--green, #29d8c7)';
    if (n <= 2) return 'var(--green, #84cc16)';
    if (n <= 4) return 'var(--yellow, #facc15)';
    return 'var(--red, #ef4444)';
  }

  function diagnose(tier, s, total) {
    if (tier.name === 'SIMPLE') return 'Clean and efficient. Snowflake will love you.';
    var labels = { joins: 'JOIN', subqueries: 'subquery', windowFns: 'window function', ctes: 'CTE', groupBy: 'GROUP BY' };
    var keys = Object.keys(labels);
    keys.sort(function (a, b) { return s[b] - s[a]; });
    var top = labels[keys[0]];
    if (tier.name === 'MODERATE') return 'Readable but watch those ' + top + 's.';
    if (tier.name === 'COMPLEX') return total + ' moving parts. Add a comment block before someone cries.';
    return 'This query has seen things. Break it into CTEs before it breaks you.';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function render(sql) {
    if (sql.trim().length <= 10) {
      out.innerHTML = '<p class="empty-state">Paste a query above to analyse it.</p>';
      return;
    }
    var s = score(sql);
    var total = s.joins + s.subqueries + s.windowFns + s.ctes + s.groupBy + s.having;
    var groupHaving = s.groupBy + s.having;
    var t = tierFor(total);
    var d = diagnose(t, s, total);
    var dims = [
      ['Joins', s.joins],
      ['Subqueries', s.subqueries],
      ['Window Functions', s.windowFns],
      ['CTEs', s.ctes],
      ['Group By / Having', groupHaving]
    ];
    var bars = dims.map(function (row) {
      var label = row[0];
      var count = row[1];
      var pct = Math.min(count / 5 * 100, 100);
      return (
        '<div class="dim">' +
          '<div class="dim-row"><span>' + esc(label) + '</span><span class="count">' + count + '</span></div>' +
          '<div class="bar"><div class="bar-fill" style="width:' + pct + '%; background:' + barColor(count) + '"></div></div>' +
        '</div>'
      );
    }).join('');
    out.innerHTML =
      '<div class="results lab-card">' +
        '<div class="tier-badge" style="background:' + t.color + '">' + t.name + '</div>' +
        bars +
        '<p class="diagnosis">' + esc(d) + '</p>' +
        '<div class="copy-wrap"><button class="copy-fallback lab-btn-quiet" id="copy" type="button">Copy summary</button></div>' +
      '</div>';
    var btn = document.getElementById('copy');
    btn.addEventListener('click', function () {
      var lines = [
        'SQL Pulse — ' + t.name,
        '  Joins: ' + s.joins,
        '  Subqueries: ' + s.subqueries,
        '  Window Functions: ' + s.windowFns,
        '  CTEs: ' + s.ctes,
        '  Group By / Having: ' + groupHaving,
        '',
        d
      ].join('\n');
      var done = function () {
        btn.textContent = 'Copied ✓';
        setTimeout(function () { btn.textContent = 'Copy summary'; }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(lines).then(done, done);
      } else {
        var ta2 = document.createElement('textarea');
        ta2.value = lines;
        document.body.appendChild(ta2);
        ta2.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta2);
        done();
      }
    });
  }

  ta.addEventListener('input', function () {
    clearTimeout(timer);
    timer = setTimeout(function () { render(ta.value); }, 300);
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    });
  }
})();
</script>
</body>
</html>
