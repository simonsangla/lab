name: Regenerate Index
on:
  push:
    paths:
      - 'apps/**'
    branches:
      - main
jobs:
  gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Generate gallery
        run: node scripts/gen-index.mjs
      - name: Commit updated gallery.html
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: regenerate gallery.html [skip ci]'
          file_pattern: gallery.html
